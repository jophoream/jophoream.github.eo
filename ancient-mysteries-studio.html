<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ancient Mysteries Studio</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070707; color: #e8e0d0; font-family: Georgia, serif; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    textarea:focus, input:focus, select:focus { outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SYSTEM_PROMPT = `You are a professional faceless YouTube/Facebook content writer specializing in ancient mysteries, lost civilizations, and unexplained phenomena. Your target audience is English-speaking viewers in the US and Europe.

Given a topic, generate a complete video production package in JSON format ONLY. No markdown, no explanation, no code fences, just raw JSON.

{
  "title": "Compelling YouTube/Facebook video title",
  "hook": "First 2 sentences — shocking or intriguing, stops the scroll",
  "script": "Full narration, 60-90 seconds aloud (~150-200 words). Mysterious, dramatic tone. Use '...' for pauses.",
  "facebook_caption": "Facebook caption with emojis, 3-4 sentences, ends with a question",
  "scenes": [
    {
      "id": 1,
      "timestamp": "0:00 - 0:10",
      "narration_excerpt": "The script excerpt for this scene",
      "image_prompt": "Hyper-detailed prompt for AI image generation. Photorealistic, cinematic, 16:9, dramatic lighting.",
      "video_motion_prompt": "Motion instruction for Grok/Veo. Camera movement + subtle scene motion."
    }
  ],
  "tags": ["10", "relevant", "hashtags"]
}

Generate exactly 5 scenes. Documentary feel. Be specific in all prompts.`;

    const gold = "#c9a84c";
    const dim = "#8a7a60";
    const bg = "#070707";
    const border = "rgba(201,168,76,0.15)";
    const card = "rgba(201,168,76,0.04)";
    const mono = "'Courier New', monospace";

    function App() {
      const [apiKey, setApiKey] = useState("");
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [showKeyPanel, setShowKeyPanel] = useState(false);
      const [topic, setTopic] = useState("");
      const [duration, setDuration] = useState("60");
      const [generating, setGenerating] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");
      const [activeTab, setActiveTab] = useState("script");
      const [copiedId, setCopiedId] = useState(null);

      // Use localStorage instead of window.storage
      useEffect(() => {
        const saved = localStorage.getItem("ams-anthropic-key");
        if (saved) {
          setApiKey(saved);
          setApiKeyInput(saved);
        } else {
          setShowKeyPanel(true);
        }
      }, []);

      const saveKey = () => {
        const k = apiKeyInput.trim();
        localStorage.setItem("ams-anthropic-key", k);
        setApiKey(k);
        setShowKeyPanel(false);
      };

      const copy = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopiedId(id);
        setTimeout(() => setCopiedId(null), 2000);
      };

      const CopyBtn = ({ text, id }) => (
        <button
          onClick={() => copy(text, id)}
          style={{
            background: copiedId === id ? gold : "rgba(201,168,76,0.1)",
            border: `1px solid ${gold}`,
            color: copiedId === id ? bg : gold,
            padding: "4px 12px", borderRadius: 4, fontSize: 10,
            cursor: "pointer", fontFamily: mono, letterSpacing: "0.05em",
            transition: "all 0.2s", flexShrink: 0,
          }}
        >
          {copiedId === id ? "✓ COPIED" : "COPY"}
        </button>
      );

      const generateScript = async () => {
        if (!topic.trim()) return;
        if (!apiKey) { setShowKeyPanel(true); return; }
        setGenerating(true); setError(""); setResult(null);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-5",
              max_tokens: 2000,
              system: SYSTEM_PROMPT,
              messages: [{ role: "user", content: `Topic: ${topic}\nDuration: ${duration} seconds` }],
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const text = data.content?.[0]?.text || "";
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          setResult(parsed);
          setActiveTab("script");
        } catch (e) {
          setError("Generation failed: " + e.message);
        } finally {
          setGenerating(false);
        }
      };

      return (
        <div style={{ minHeight: "100vh", background: bg, color: "#e8e0d0", fontFamily: "Georgia, serif", backgroundImage: "radial-gradient(ellipse at 20% 20%, rgba(139,90,30,0.07) 0%, transparent 60%)" }}>
          <style>{`@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }`}</style>

          {/* Header */}
          <div style={{ borderBottom: `1px solid ${border}`, padding: "20px 28px", background: card }}>
            <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 3 }}>
                  <span style={{ fontSize: 18, color: gold }}>◈</span>
                  <h1 style={{ margin: 0, fontSize: 18, fontWeight: "normal", letterSpacing: "0.18em", color: gold, textTransform: "uppercase" }}>
                    Ancient Mysteries Studio
                  </h1>
                </div>
                <p style={{ margin: "0 0 0 28px", fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.1em" }}>
                  FACELESS CONTENT PRODUCTION ASSISTANT
                </p>
              </div>
              <button
                onClick={() => setShowKeyPanel(!showKeyPanel)}
                style={{
                  background: apiKey ? "rgba(201,168,76,0.1)" : "rgba(200,60,60,0.12)",
                  border: `1px solid ${apiKey ? gold : "#c04040"}`,
                  color: apiKey ? gold : "#e06060",
                  padding: "6px 14px", borderRadius: 5, fontSize: 9,
                  fontFamily: mono, cursor: "pointer", letterSpacing: "0.08em",
                }}
              >
                {apiKey ? "⚙ API KEY ✓" : "⚠ SET API KEY"}
              </button>
            </div>
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "26px 28px" }}>

            {/* API Key Panel */}
            {showKeyPanel && (
              <div style={{ background: "rgba(0,0,0,0.5)", border: `1px solid ${border}`, borderRadius: 8, padding: 20, marginBottom: 22 }}>
                <p style={{ margin: "0 0 4px", fontSize: 10, color: dim, fontFamily: mono, letterSpacing: "0.1em" }}>
                  ANTHROPIC API KEY
                </p>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: "#7a6a50", lineHeight: 1.6 }}>
                  Get your free key at{" "}
                  <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{ color: gold }}>
                    console.anthropic.com
                  </a>
                  {" "}→ API Keys. Biaya sangat murah (~$0.003 per video script).
                </p>
                <div style={{ display: "flex", gap: 10 }}>
                  <input
                    type="password"
                    value={apiKeyInput}
                    onChange={(e) => setApiKeyInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && saveKey()}
                    placeholder="sk-ant-api03-..."
                    style={{
                      flex: 1, background: "rgba(0,0,0,0.4)",
                      border: `1px solid ${border}`, borderRadius: 5,
                      color: "#e8e0d0", padding: "8px 12px", fontSize: 13,
                      fontFamily: mono,
                    }}
                  />
                  <button
                    onClick={saveKey}
                    style={{
                      background: gold, color: bg, border: "none",
                      borderRadius: 5, padding: "8px 22px", fontSize: 11,
                      fontFamily: mono, letterSpacing: "0.1em", cursor: "pointer", fontWeight: "bold",
                    }}
                  >
                    SAVE
                  </button>
                </div>
                <p style={{ margin: "10px 0 0", fontSize: 10, color: dim, fontFamily: mono }}>
                  ⚠ Key disimpan di browser kamu saja. Jangan share file ini ke orang lain.
                </p>
              </div>
            )}

            {/* Topic Input */}
            <div style={{ background: card, border: `1px solid ${border}`, borderRadius: 8, padding: 22, marginBottom: 22 }}>
              <label style={{ display: "block", fontSize: 9, letterSpacing: "0.15em", color: dim, marginBottom: 10, fontFamily: mono, textTransform: "uppercase" }}>
                Video Topic
              </label>
              <textarea
                value={topic}
                onChange={(e) => setTopic(e.target.value)}
                rows={2}
                placeholder="e.g. The impossible precision of Pumapunku stones, Göbekli Tepe mystery, Nazca Lines from space..."
                style={{
                  width: "100%", background: "rgba(0,0,0,0.4)",
                  border: `1px solid rgba(201,168,76,0.2)`, borderRadius: 6,
                  color: "#e8e0d0", padding: "12px 14px", fontSize: 14,
                  fontFamily: "Georgia, serif", resize: "none", lineHeight: 1.6,
                }}
              />
              <div style={{ display: "flex", gap: 14, marginTop: 14, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div>
                  <label style={{ display: "block", fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.08em", marginBottom: 5, textTransform: "uppercase" }}>Duration</label>
                  <select
                    value={duration}
                    onChange={(e) => setDuration(e.target.value)}
                    style={{ background: "rgba(0,0,0,0.4)", border: `1px solid ${border}`, borderRadius: 5, color: "#e8e0d0", padding: "7px 12px", fontSize: 12, fontFamily: mono, cursor: "pointer" }}
                  >
                    <option value="45">45 sec — Reel</option>
                    <option value="60">60 sec — Short</option>
                    <option value="90">90 sec — Extended</option>
                  </select>
                </div>
                <button
                  onClick={generateScript}
                  disabled={generating || !topic.trim()}
                  style={{
                    background: generating || !topic.trim() ? "rgba(201,168,76,0.08)" : gold,
                    color: generating || !topic.trim() ? dim : bg,
                    border: "none", borderRadius: 6, padding: "9px 28px",
                    fontSize: 11, fontFamily: mono, letterSpacing: "0.15em",
                    textTransform: "uppercase", cursor: generating || !topic.trim() ? "not-allowed" : "pointer",
                    fontWeight: "bold", transition: "all 0.2s",
                  }}
                >
                  {generating ? "◈ GENERATING..." : "◈ GENERATE SCRIPT"}
                </button>
              </div>
            </div>

            {error && (
              <div style={{ background: "rgba(180,50,50,0.1)", border: "1px solid rgba(180,50,50,0.3)", borderRadius: 6, padding: "12px 16px", color: "#e08080", fontSize: 13, marginBottom: 18 }}>
                {error}
              </div>
            )}

            {generating && (
              <div style={{ textAlign: "center", padding: "50px 20px", color: dim }}>
                <div style={{ fontSize: 30, marginBottom: 12, animation: "pulse 2s infinite" }}>◈</div>
                <p style={{ fontSize: 11, letterSpacing: "0.12em", fontFamily: mono }}>SUMMONING ANCIENT KNOWLEDGE...</p>
              </div>
            )}

            {result && (
              <div>
                {/* Title */}
                <div style={{ background: "rgba(201,168,76,0.06)", border: "1px solid rgba(201,168,76,0.25)", borderRadius: 8, padding: "15px 20px", marginBottom: 18, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 14 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.12em", marginBottom: 5 }}>VIDEO TITLE</div>
                    <div style={{ fontSize: 16, color: gold, lineHeight: 1.4 }}>{result.title}</div>
                  </div>
                  <CopyBtn text={result.title} id="title" />
                </div>

                {/* Tabs */}
                <div style={{ display: "flex", borderBottom: `1px solid ${border}`, marginBottom: 18 }}>
                  {["script", "scenes", "social"].map((tab) => (
                    <button
                      key={tab}
                      onClick={() => setActiveTab(tab)}
                      style={{
                        background: "none", border: "none",
                        borderBottom: activeTab === tab ? `2px solid ${gold}` : "2px solid transparent",
                        color: activeTab === tab ? gold : "#5a4a30",
                        padding: "9px 22px", fontSize: 10, fontFamily: mono,
                        letterSpacing: "0.12em", textTransform: "uppercase",
                        cursor: "pointer", marginBottom: -1,
                      }}
                    >
                      {tab === "script" ? "📜 Script" : tab === "scenes" ? "🎬 Scenes" : "📱 Social"}
                    </button>
                  ))}
                </div>

                {/* Script Tab */}
                {activeTab === "script" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    <div style={{ background: "rgba(201,168,76,0.07)", border: "1px solid rgba(201,168,76,0.28)", borderRadius: 8, padding: "16px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <span style={{ fontSize: 9, color: gold, fontFamily: mono, letterSpacing: "0.12em" }}>⚡ OPENING HOOK</span>
                        <CopyBtn text={result.hook} id="hook" />
                      </div>
                      <p style={{ margin: 0, fontSize: 15, lineHeight: 1.85, fontStyle: "italic", color: "#d0c090" }}>"{result.hook}"</p>
                    </div>
                    <div style={{ background: "rgba(0,0,0,0.3)", border: `1px solid ${border}`, borderRadius: 8, padding: "16px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <span style={{ fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.12em" }}>FULL NARRATION SCRIPT</span>
                        <CopyBtn text={result.script} id="script" />
                      </div>
                      <p style={{ margin: 0, fontSize: 14, lineHeight: 1.95, color: "#c0b89a", whiteSpace: "pre-wrap" }}>{result.script}</p>
                    </div>
                  </div>
                )}

                {/* Scenes Tab */}
                {activeTab === "scenes" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    {result.scenes?.map((scene) => (
                      <div key={scene.id} style={{ background: "rgba(0,0,0,0.3)", border: `1px solid ${border}`, borderRadius: 8, padding: "16px 18px" }}>
                        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
                          <span style={{ background: gold, color: bg, width: 22, height: 22, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: "bold", fontFamily: mono, flexShrink: 0 }}>
                            {scene.id}
                          </span>
                          <span style={{ fontSize: 11, color: dim, fontFamily: mono }}>{scene.timestamp}</span>
                        </div>
                        <p style={{ margin: "0 0 14px", fontSize: 13, color: "#8a8070", fontStyle: "italic", lineHeight: 1.6 }}>
                          "{scene.narration_excerpt}"
                        </p>
                        <div style={{ background: "rgba(40,80,140,0.1)", border: "1px solid rgba(80,120,200,0.2)", borderRadius: 6, padding: "11px 13px", marginBottom: 10 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                            <span style={{ fontSize: 10, color: "#7090d0", fontFamily: mono }}>🖼️ IMAGE PROMPT (Copilot)</span>
                            <CopyBtn text={scene.image_prompt} id={`img-${scene.id}`} />
                          </div>
                          <p style={{ margin: 0, fontSize: 12, color: "#9aaecc", lineHeight: 1.65 }}>{scene.image_prompt}</p>
                        </div>
                        <div style={{ background: "rgba(100,40,140,0.1)", border: "1px solid rgba(140,70,180,0.2)", borderRadius: 6, padding: "11px 13px" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                            <span style={{ fontSize: 10, color: "#b070d0", fontFamily: mono }}>🎬 MOTION PROMPT (Grok)</span>
                            <CopyBtn text={scene.video_motion_prompt} id={`vid-${scene.id}`} />
                          </div>
                          <p style={{ margin: 0, fontSize: 12, color: "#c0a0d8", lineHeight: 1.65 }}>{scene.video_motion_prompt}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Social Tab */}
                {activeTab === "social" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    <div style={{ background: "rgba(0,0,0,0.3)", border: `1px solid ${border}`, borderRadius: 8, padding: "16px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <span style={{ fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.1em" }}>📱 FACEBOOK CAPTION</span>
                        <CopyBtn text={result.facebook_caption} id="caption" />
                      </div>
                      <p style={{ margin: 0, fontSize: 14, lineHeight: 1.85, color: "#c0b89a", whiteSpace: "pre-wrap" }}>{result.facebook_caption}</p>
                    </div>
                    <div style={{ background: "rgba(0,0,0,0.3)", border: `1px solid ${border}`, borderRadius: 8, padding: "16px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                        <span style={{ fontSize: 9, color: dim, fontFamily: mono, letterSpacing: "0.1em" }}># HASHTAGS</span>
                        <CopyBtn text={result.tags?.join(" ")} id="tags" />
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {result.tags?.map((tag, i) => (
                          <span
                            key={i}
                            onClick={() => copy(tag, `tag-${i}`)}
                            style={{ background: "rgba(201,168,76,0.07)", border: `1px solid ${border}`, borderRadius: 4, padding: "4px 10px", fontSize: 11, color: gold, fontFamily: mono, cursor: "pointer" }}
                          >
                            {tag}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
